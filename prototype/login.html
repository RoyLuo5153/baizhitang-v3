<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #2978B5;
      --color-primary-container:    #D4E8F5;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #F8F6F0;
      --color-surface-container-lowest:   #FAFAF5;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F0EDE5;
      --color-surface-container-high:     #E8E4DB;
      --color-surface-container-highest:  #DDD8CE;
      /* === 文字 === */
      --color-on-surface:           #1D2733;
      --color-on-surface-variant:   #667085;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #D4CFC4;
      --color-outline-variant:  #E6E1D8;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.1);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen flex flex-col">

  <!-- @main-content:start -->
  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-sm">

      <!-- 登录卡片 -->
      <div class="bg-surface rounded-xl shadow-card p-8">
        <!-- Logo区域 -->
        <div class="flex flex-col items-center gap-3 mb-8">
          <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
            <i data-lucide="heart-pulse" class="w-7 h-7 text-primary"></i>
          </div>
          <h1 class="text-xl font-bold text-on-surface tracking-tight">百芝堂赋能系统</h1>
          <p class="text-sm text-on-surface-variant">培训赋能 · 双轨驱动</p>
        </div>

        <!-- 表单区域 -->
        <div class="space-y-4">
          <!-- 用户名输入框 -->
          <div>
            <label for="input-username" class="block text-sm font-medium text-on-surface mb-1.5">用户名</label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant/50"></i>
              <input id="input-username" type="text" placeholder="请输入用户名"
                class="w-full bg-surface-container border-none rounded-md pl-9 pr-3 py-2.5 text-sm
                       text-on-surface placeholder:text-on-surface-variant/50
                       focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" />
            </div>
          </div>

          <!-- 密码输入框 -->
          <div>
            <label for="input-password" class="block text-sm font-medium text-on-surface mb-1.5">密码</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant/50"></i>
              <input id="input-password" type="password" placeholder="请输入密码"
                class="w-full bg-surface-container border-none rounded-md pl-9 pr-10 py-2.5 text-sm
                       text-on-surface placeholder:text-on-surface-variant/50
                       focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" />
              <button id="btn-toggle-password" type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-on-surface-variant transition-colors">
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <!-- 角色选择下拉 -->
          <div>
            <label for="select-role" class="block text-sm font-medium text-on-surface mb-1.5">角色</label>
            <div class="relative">
              <i data-lucide="shield" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant/50"></i>
              <select id="select-role"
                class="w-full bg-surface-container border-none rounded-md pl-9 pr-8 py-2.5 text-sm
                       text-on-surface appearance-none
                       focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors
                       [&>option]:bg-surface [&>option]:text-on-surface">
                <option value="trainee">新人</option>
                <option value="mentor">带教老师</option>
                <option value="teacher">培训老师</option>
                <option value="manager" selected>培训负责人</option>
                <option value="boss">总经理</option>
              </select>
              <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant/50 pointer-events-none"></i>
            </div>
          </div>

          <!-- 登录按钮 -->
          <button id="btn-login"
            class="w-full bg-primary text-on-primary px-4 py-2.5 rounded-md text-sm font-medium
                   hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center justify-center gap-2 mt-2">
            <i data-lucide="log-in" class="w-4 h-4"></i>
            登录
          </button>
        </div>
      </div>

      <!-- 底部小字 -->
      <p class="text-center text-xs text-on-surface-variant/60 mt-6">百芝堂糖尿病慢病管理</p>
    </div>
  </main>
  <!-- @main-content:end -->

  <script>
    lucide.createIcons();

    $(function () {
      // 密码显示/隐藏切换
      var passwordVisible = false;
      $('#btn-toggle-password').on('click', function () {
        passwordVisible = !passwordVisible;
        var $input = $('#input-password');
        if (passwordVisible) {
          $input.attr('type', 'text');
          $(this).find('i').attr('data-lucide', 'eye-off');
        } else {
          $input.attr('type', 'password');
          $(this).find('i').attr('data-lucide', 'eye');
        }
        lucide.createIcons();
      });

      // 登录按钮 - demo项目不判断账密，直接跳转
      $('#btn-login').on('click', function () {
        window.location.href = 'home.html';
      });

      // 回车键触发登录
      $('#input-username, #input-password').on('keydown', function (e) {
        if (e.key === 'Enter') {
          $('#btn-login').trigger('click');
        }
      });
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet"/>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #102A43;
      --color-primary-container:    #1B3A5C;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #F8F6F0;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EFEEE8;
      --color-surface-container-high:     #E2E0DA;
      --color-surface-container-highest:  #D5D3CD;
      /* === 文字 === */
      --color-on-surface:           #1D2733;
      --color-on-surface-variant:   #667085;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #F59E0B;
      --color-info:     #2978B5;
      /* === 边框 === */
      --color-outline:          #E6E1D8;
      --color-outline-variant:  #D1CCC3;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.1);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
      --font-serif: "Noto Serif SC", Georgia, serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <aside class="fixed left-0 top-0 h-full w-56 bg-surface border-r border-outline-variant/20 flex flex-col z-40">

        <div class="w-8 h-8 rounded-md bg-primary flex items-center justify-center">

        </div>
        <span class="font-serif font-bold text-base text-primary">百芝堂V3</span>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto py-3 px-3">
      <div class="mb-1">
        <a href="question-bank.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="book-open" class="w-4 h-4"></i>
          <span>题库管理</span>
        </a>
      </div>
      <div class="mb-1">
        <a href="assessment.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="clipboard-check" class="w-4 h-4"></i>
          <span>日常考核</span>
        </a>
      </div>
      <div class="mb-1">
        <a href="trainee-profiles.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-on-surface hover:bg-surface-container transition-colors">
          <i data-lucide="users" class="w-4 h-4"></i>
          <span>新人档案</span>
        </a>
      </div>
    </nav>
  </aside>
  <!-- @nav:end 导航组件 -->

  <main class="ml-56 min-h-screen p-6">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
